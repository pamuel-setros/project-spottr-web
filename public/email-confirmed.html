<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed - SPOTTR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #c9d1d9;
            overflow: hidden;
        }
        .container {
            background: #161b22;
            padding: 32px 40px;
            border-radius: 6px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(1, 4, 9, 0.2);
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-sizing: border-box;
            opacity: 0;
            animation: containerDragIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes containerDragIn {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes itemDragIn {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes logoFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .container > * {
            opacity: 0;
            animation: itemDragIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .icon-wrapper { animation-delay: 0.1s; }
        h1 { animation-delay: 0.2s; }
        p { animation-delay: 0.3s; }
        .btn { animation-delay: 0.4s; }
        .logo {
            position: absolute;
            top: 24px;
            left: 24px;
            height: 24px;
            animation: logoFadeIn 0.5s ease forwards;
        }
        .icon-wrapper {
            color: #3fb950;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 16px;
        }
        .icon-wrapper svg {
            width: 32px;
            height: 32px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 0 0 8px;
            color: #ffffff;
        }
        p {
            font-size: 14px;
            color: #8b949e;
            line-height: 1.5;
            margin: 0 0 24px;
        }
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            padding: 9px 20px;
            border-radius: 6px;
            border: 1px solid rgba(240, 246, 252, 0.1);
            font-weight: 500;
            font-size: 14px;
            line-height: 20px;
            transition: all 0.2s ease;
            transition-property: background-color, border-color;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #2ea043;
            border-color: rgba(240, 246, 252, 0.1);
        }
    </style>
</head>
<body>
    <img src="/spottr_text.png" alt="SPOTTR Logo" class="logo">
    <div class="container">
        <div class="icon-wrapper">
            <!-- Checkmark SVG -->
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1>Email Confirmed</h1>
        <p>Your email has been successfully verified. You can now head back to the SPOTTR app and sign in.</p>
        <a href="/" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
